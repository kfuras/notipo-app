steps:
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '-t'
      - '$_IMAGE'
      - '-f'
      - 'apps/web/Dockerfile'
      - '--build-arg'
      - 'NEXT_PUBLIC_POSTHOG_KEY=$_POSTHOG_KEY'
      - '--build-arg'
      - 'NEXT_PUBLIC_POSTHOG_HOST=/ingest'
      - '--build-arg'
      - 'NEXT_PUBLIC_META_PIXEL_ID=$_META_PIXEL_ID'
      - '--build-arg'
      - 'NEXT_PUBLIC_SENTRY_DSN=$_SENTRY_DSN'
      - '.'
images: ['$_IMAGE']
