name: Deploy to Cloud Run

on:
  workflow_run:
    workflows: [CI]
    types: [completed]
    branches: [main]

env:
  REGION: europe-west4
  REGISTRY: europe-west4-docker.pkg.dev/notipo-prod/notipo

jobs:
  deploy-api:
    name: Deploy API
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    concurrency: deploy-api
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v6

      - uses: google-github-actions/auth@v3
        with:
          workload_identity_provider: projects/625508940450/locations/global/workloadIdentityPools/github-pool/providers/github-provider
          service_account: github-deploy@notipo-prod.iam.gserviceaccount.com

      - uses: google-github-actions/setup-gcloud@v3

      - run: gcloud auth configure-docker $REGION-docker.pkg.dev --quiet

      - name: Build API image
        run: |
          gcloud builds submit \
            --config=cloudbuild-api.yaml \
            --substitutions=_IMAGE=$REGISTRY/api \
            --region=$REGION .

      - name: Run Prisma migrations
        run: |
          gcloud run jobs update notipo-migrate \
            --region $REGION \
            --container migrate \
            --image $REGISTRY/api
          gcloud run jobs execute notipo-migrate \
            --region $REGION \
            --wait

      - name: Deploy API
        run: |
          gcloud run deploy notipo-api \
            --image $REGISTRY/api \
            --region $REGION

  deploy-web:
    name: Deploy Web
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    concurrency: deploy-web
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v6

      - uses: google-github-actions/auth@v3
        with:
          workload_identity_provider: projects/625508940450/locations/global/workloadIdentityPools/github-pool/providers/github-provider
          service_account: github-deploy@notipo-prod.iam.gserviceaccount.com

      - uses: google-github-actions/setup-gcloud@v3

      - run: gcloud auth configure-docker $REGION-docker.pkg.dev --quiet

      - name: Build Web image
        run: |
          gcloud builds submit \
            --config=cloudbuild-web.yaml \
            --substitutions=_IMAGE=$REGISTRY/web,_POSTHOG_KEY=$POSTHOG_KEY,_META_PIXEL_ID=$META_PIXEL_ID,_SENTRY_DSN=$SENTRY_DSN \
            --region=$REGION .
        env:
          POSTHOG_KEY: ${{ secrets.NEXT_PUBLIC_POSTHOG_KEY }}
          META_PIXEL_ID: ${{ secrets.NEXT_PUBLIC_META_PIXEL_ID }}
          SENTRY_DSN: ${{ secrets.NEXT_PUBLIC_SENTRY_DSN }}

      - name: Deploy Web
        run: |
          gcloud run deploy notipo-web \
            --image $REGISTRY/web \
            --region $REGION
