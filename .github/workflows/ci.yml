name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  REGION: europe-west4
  REGISTRY: europe-west4-docker.pkg.dev/notipo-prod/notipo

jobs:
  lockfile-check:
    name: Verify lockfile
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Check for Alpine Linux native binaries
        run: |
          missing=""
          grep -q "@img/sharp-linuxmusl-x64" package-lock.json || missing="$missing sharp-linuxmusl-x64"
          grep -q "lightningcss-linux-x64-musl" package-lock.json || missing="$missing lightningcss-linux-x64-musl"
          if [ -n "$missing" ]; then
            echo "::error::Lockfile missing Alpine Linux binaries:$missing"
            echo "Run 'npm install' with .npmrc in place to fix."
            exit 1
          fi
          echo "All platform binaries present in lockfile."

  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: corepack enable
      - run: npm ci
      - run: npm run generate -w @notipo/api
      - run: npx turbo build
      - run: npx turbo test

  deploy-api:
    name: Deploy API
    needs: [build, lockfile-check]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    concurrency: deploy-api
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v6

      - uses: google-github-actions/auth@v3
        with:
          workload_identity_provider: projects/625508940450/locations/global/workloadIdentityPools/github-pool/providers/github-provider
          service_account: github-deploy@notipo-prod.iam.gserviceaccount.com

      - uses: google-github-actions/setup-gcloud@v3

      - run: gcloud auth configure-docker $REGION-docker.pkg.dev --quiet

      - name: Build and push API image
        run: |
          docker build -t $REGISTRY/api -f apps/api/Dockerfile .
          docker push $REGISTRY/api

      - name: Run Prisma migrations
        run: |
          gcloud run jobs update notipo-migrate \
            --region $REGION \
            --container migrate \
            --image $REGISTRY/api
          gcloud run jobs execute notipo-migrate \
            --region $REGION \
            --wait

      - name: Deploy API
        run: |
          gcloud run deploy notipo-api \
            --image $REGISTRY/api \
            --region $REGION

  deploy-web:
    name: Deploy Web
    needs: [build, lockfile-check]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    concurrency: deploy-web
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v6

      - uses: google-github-actions/auth@v3
        with:
          workload_identity_provider: projects/625508940450/locations/global/workloadIdentityPools/github-pool/providers/github-provider
          service_account: github-deploy@notipo-prod.iam.gserviceaccount.com

      - uses: google-github-actions/setup-gcloud@v3

      - run: gcloud auth configure-docker $REGION-docker.pkg.dev --quiet

      - name: Build and push Web image
        run: |
          docker build \
            -t $REGISTRY/web \
            -f apps/web/Dockerfile \
            --build-arg NEXT_PUBLIC_POSTHOG_KEY=${{ secrets.NEXT_PUBLIC_POSTHOG_KEY }} \
            --build-arg NEXT_PUBLIC_POSTHOG_HOST=/ingest \
            --build-arg NEXT_PUBLIC_META_PIXEL_ID=${{ secrets.NEXT_PUBLIC_META_PIXEL_ID }} \
            --build-arg NEXT_PUBLIC_SENTRY_DSN=${{ secrets.NEXT_PUBLIC_SENTRY_DSN }} \
            .
          docker push $REGISTRY/web

      - name: Deploy Web
        run: |
          gcloud run deploy notipo-web \
            --image $REGISTRY/web \
            --region $REGION
