name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lockfile-check:
    name: Verify lockfile
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Check for Alpine Linux native binaries
        run: |
          missing=""
          grep -q "@img/sharp-linuxmusl-x64" package-lock.json || missing="$missing sharp-linuxmusl-x64"
          grep -q "lightningcss-linux-x64-musl" package-lock.json || missing="$missing lightningcss-linux-x64-musl"
          if [ -n "$missing" ]; then
            echo "::error::Lockfile missing Alpine Linux binaries:$missing"
            echo "Run 'npm install' with .npmrc in place to fix."
            exit 1
          fi
          echo "All platform binaries present in lockfile."

  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v7
        with:
          node-version: 24
          cache: npm
      - run: corepack enable
      - run: npm ci
      - run: npm run generate -w @notipo/api
      - run: npx turbo build
      - run: npx turbo test

  deploy-api:
    name: Deploy API to Fly
    needs: [build, lockfile-check]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    concurrency: deploy-api
    steps:
      - uses: actions/checkout@v6
      - uses: superfly/flyctl-actions/setup-flyctl@master
      - name: Deploy API
        run: flyctl deploy -c fly.prod-api.toml --remote-only
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}

  deploy-web:
    name: Deploy Web to Fly
    needs: [build, lockfile-check]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    concurrency: deploy-web
    steps:
      - uses: actions/checkout@v6
      - uses: superfly/flyctl-actions/setup-flyctl@master
      - name: Deploy Web
        run: flyctl deploy -c fly.prod-web.toml --remote-only
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
