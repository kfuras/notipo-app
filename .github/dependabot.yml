version: 2
updates:
  # Root npm workspace + all apps/packages picked up via the workspace pattern
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: '06:00'
      timezone: Europe/Oslo
    open-pull-requests-limit: 10
    versioning-strategy: increase-if-necessary
    groups:
      # Group minor + patch updates so we don't get flooded with PRs
      minor-and-patch:
        update-types:
          - minor
          - patch
      # Major updates stay separate so they're reviewed individually
      typescript:
        patterns:
          - 'typescript'
          - '@types/*'
      prisma:
        patterns:
          - 'prisma'
          - '@prisma/*'
      next:
        patterns:
          - 'next'
          - 'eslint-config-next'
      react:
        patterns:
          - 'react'
          - 'react-dom'
          - '@types/react'
          - '@types/react-dom'
      sentry:
        patterns:
          - '@sentry/*'
    # Major bumps that have known breaking changes for our codebase.
    # Re-evaluate manually when we have time to migrate.
    ignore:
      - dependency-name: '@notionhq/client'
        update-types: ['version-update:semver-major']
      - dependency-name: 'stripe'
        update-types: ['version-update:semver-major']
      - dependency-name: '@stripe/stripe-js'
        update-types: ['version-update:semver-major']
      - dependency-name: '@fastify/multipart'
        update-types: ['version-update:semver-major']
      - dependency-name: 'vitest'
        update-types: ['version-update:semver-major']
      - dependency-name: 'eslint'
        update-types: ['version-update:semver-major']
      - dependency-name: 'dotenv'
        update-types: ['version-update:semver-major']
      - dependency-name: 'lucide-react'
        update-types: ['version-update:semver-major']
      - dependency-name: '@stripe/react-stripe-js'
        update-types: ['version-update:semver-major']
      - dependency-name: 'zod'
        update-types: ['version-update:semver-major']

  # GitHub Actions — pin and bump weekly so we get security patches
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: '06:00'
      timezone: Europe/Oslo
    open-pull-requests-limit: 5

  # Docker base images for the prod and dev images
  - package-ecosystem: docker
    directories:
      - /apps/api
      - /apps/web
    schedule:
      interval: weekly
      day: monday
      time: '06:00'
      timezone: Europe/Oslo
    open-pull-requests-limit: 3
    # Stay on Node LTS in Docker images. The current major (Node 26 as of
    # May 2026) hits "Current" status, not LTS. Bump deliberately when the
    # next LTS lands or our LTS approaches end-of-life.
    ignore:
      - dependency-name: 'node'
        update-types: ['version-update:semver-major']
