# Production deployment with Traefik reverse proxy + Let's Encrypt TLS.
# Usage:
#   1. Copy apps/api/.env.example to .env and fill in all values
#   2. docker compose up -d

name: notipo

services:
  traefik:
    container_name: notipo-traefik
    image: traefik:v3.6.2
    restart: unless-stopped
    command:
      - --providers.docker=true
      - --providers.docker.exposedbydefault=false
      - --entrypoints.web.address=:80
      - --entrypoints.websecure.address=:443
      # Redirect all HTTP → HTTPS
      - --entrypoints.web.http.redirections.entrypoint.to=websecure
      - --entrypoints.web.http.redirections.entrypoint.scheme=https
      # Let's Encrypt via HTTP challenge
      - --certificatesresolvers.letsencrypt.acme.httpchallenge=true
      - --certificatesresolvers.letsencrypt.acme.httpchallenge.entrypoint=web
      - --certificatesresolvers.letsencrypt.acme.email=${ACME_EMAIL}
      - --certificatesresolvers.letsencrypt.acme.storage=/letsencrypt/acme.json
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - letsencrypt:/letsencrypt

  app:
    container_name: notipo-app
    image: ghcr.io/kfuras/notipo-api:latest
    restart: unless-stopped
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://notipo:${DB_PASSWORD}@postgres:5432/notipo
    env_file: .env
    command: ["sh", "-c", "npx prisma migrate deploy && node dist/index.js"]
    volumes:
      - uploads:/app/apps/api/uploads
    depends_on:
      postgres:
        condition: service_healthy
    labels:
      - traefik.enable=true
      - traefik.http.routers.app.rule=Host(`${DOMAIN}`) && (PathPrefix(`/api`) || Path(`/health`))
      - traefik.http.routers.app.entrypoints=websecure
      - traefik.http.routers.app.tls=true
      - traefik.http.routers.app.tls.certresolver=letsencrypt
      - traefik.http.routers.app.priority=20
      - traefik.http.services.app.loadbalancer.server.port=3000

  web:
    container_name: notipo-web
    image: ghcr.io/kfuras/notipo-web:latest
    restart: unless-stopped
    labels:
      - traefik.enable=true
      - traefik.http.routers.web.rule=Host(`${DOMAIN}`)
      - traefik.http.routers.web.entrypoints=websecure
      - traefik.http.routers.web.tls=true
      - traefik.http.routers.web.tls.certresolver=letsencrypt
      - traefik.http.routers.web.priority=10
      - traefik.http.services.web.loadbalancer.server.port=80

  postgres:
    container_name: notipo-postgres
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: notipo
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: notipo
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U notipo"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  letsencrypt:
  pgdata:
  uploads:
